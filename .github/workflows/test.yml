name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Bats
        run: npm install -g bats
      - name: Run tests
        run: |
          bats test/api_key.bats test/shell_detect.bats test/env_file.bats \
               test/source_block.bats test/doctor.bats test/cli.bats
