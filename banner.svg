<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Terminal window frame -->
  <rect x="80" y="60" width="1120" height="520" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect x="80" y="60" width="1120" height="40" rx="12" fill="#161b22"/>
  <rect x="80" y="88" width="1120" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="106" cy="80" r="7" fill="#ff5f57"/>
  <circle cx="128" cy="80" r="7" fill="#febc2e"/>
  <circle cx="150" cy="80" r="7" fill="#27c840"/>

  <!-- Prompt line -->
  <text x="120" y="180" font-family="Menlo, Monaco, monospace" font-size="24" fill="#58a6ff">
    <tspan fill="#8b949e">$</tspan> claudeep doctor --fix
  </text>

  <!-- Response lines -->
  <text x="120" y="235" font-family="Menlo, Monaco, monospace" font-size="22" fill="#8b949e">
    <tspan fill="#3fb950">✓</tspan> Environment variables
  </text>
  <text x="120" y="275" font-family="Menlo, Monaco, monospace" font-size="22" fill="#8b949e">
    <tspan fill="#3fb950">✓</tspan> Config file (permissions: 600)
  </text>
  <text x="120" y="315" font-family="Menlo, Monaco, monospace" font-size="22" fill="#8b949e">
    <tspan fill="#f0883e">✗</tspan> Key mismatch — auto-repaired
  </text>
  <text x="120" y="355" font-family="Menlo, Monaco, monospace" font-size="22" fill="#8b949e">
    <tspan fill="#f0883e">✗</tspan> Stale exports removed — auto-repaired
  </text>
  <text x="120" y="395" font-family="Menlo, Monaco, monospace" font-size="22" fill="#8b949e">
    <tspan fill="#3fb950">✓</tspan> API connectivity (HTTP 200)
  </text>

  <!-- Summary line with gradient -->
  <text x="120" y="455" font-family="Menlo, Monaco, monospace" font-size="24" fill="url(#accent)">
    ═══════════════════════════════════════
  </text>
  <text x="120" y="500" font-family="Menlo, Monaco, monospace" font-size="24" fill="#3fb950">
    ✓ All checks passed. You're ready: claude --bare
  </text>

  <!-- Bottom title -->
  <text x="640" y="600" font-family="Menlo, Monaco, monospace" font-size="18" fill="#8b949e" text-anchor="middle">
    Claude Code + DeepSeek API — github.com/xuechaow/claudeep
  </text>
</svg>
